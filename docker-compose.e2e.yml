# Self-contained e2e stack. Boots mongo, mock-oidc, minio, admin, site, and
# a playwright test runner on a shared compose network. Service names
# resolve via DNS, so the runner reaches the app as `http://admin:3001`
# and the admin's OIDC redirect to `http://mock-oidc:9000/default` is
# resolvable inside the headless browser as well.
#
# Run from repo root (or via `turbo run test:e2e`, which invokes this
# through `e2e/package.json`):
#
#   docker compose -f docker-compose.e2e.yml run --rm --build e2e-runner
#
# IMPORTANT: Do NOT use `docker compose up --abort-on-container-exit`.
# The minio-init container is a one-shot bootstrapper that exits with
# code 0 after creating the S3 bucket. --abort-on-container-exit treats
# ANY container exit as the signal to tear down the stack, which kills
# the auth service (and everything else) before the tests can run.
# Use `docker compose run` instead — it starts only the e2e-runner and
# its dependency chain, waits for it to finish, and returns its exit code.
#
# Mongo + MinIO use tmpfs/ephemeral volumes so every run starts from a
# clean database and empty bucket. The admin seeds default navbar/footer/
# security-config on first query (apps/admin/lib/db/db-bootstrap.ts), so no
# seed step is needed. The minio-init container provisions the bucket.

services:
  pfadimh-mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    tmpfs:
      - /data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-oidc:
    # The mock-oauth2-server image is distroless — no shell, no curl,
    # nothing to run a healthcheck with. Dependents wait for
    # `service_started` and the e2e-runner explicitly polls the
    # well-known endpoint before invoking playwright.
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    environment:
      SERVER_PORT: "9000"
      JSON_CONFIG_PATH: /app/config/config.json
    volumes:
      - ./infra/mock-oidc:/app/config:ro

  # S3-compatible bucket for e2e. No host port mapping — admin, site, and
  # the playwright runner all reach it via the `minio` DNS name on the
  # shared compose network. Data lives in a tmpfs so each run starts empty.
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot bucket provisioner. Exits 0 once the bucket exists and is
  # set to anonymous download. Admin + site wait on this via
  # `service_completed_successfully`.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing local/pfadimh-files;
      /usr/bin/mc anonymous set download local/pfadimh-files;
      echo 'MinIO bucket ready.';
      exit 0;
      "

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    environment:
      AUTH_PORT: "3002"
      AUTH_ISSUER_URL: http://auth:3002
      MIDATA_AUTHORIZE_URL: http://mock-oidc:9000/default/authorize
      MIDATA_TOKEN_URL: http://mock-oidc:9000/default/token
      MIDATA_USERINFO_URL: http://mock-oidc:9000/default/userinfo
      MIDATA_CLIENT_ID: pfadimh-sso
      MIDATA_CLIENT_SECRET: dev-secret
      MONGODB_CONNECTION_STRING: mongodb://root:example@pfadimh-mongo:27017
      MONGODB_DB_NAME: pfadimh_e2e
    depends_on:
      pfadimh-mongo:
        condition: service_healthy
      mock-oidc:
        condition: service_started
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 3s
      timeout: 5s
      retries: 20

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: http://site:3000
    environment:
      AUTH_SECRET: e2e-test-secret
      AUTH_URL: http://admin:3001
      AUTH_TRUST_HOST: "true"
      MONGODB_CONNECTION_STRING: mongodb://root:example@pfadimh-mongo:27017
      MONGODB_DB_NAME: pfadimh_e2e
      AUTH_OIDC_ISSUER: http://auth:3002
      AUTH_OIDC_CLIENT_ID: pfadimh-admin
      AUTH_OIDC_CLIENT_SECRET: dev-secret
      # S3 / MinIO. Reads go through presigned GET URLs signed by the admin,
      # and those URLs must be reachable by the headless browser inside the
      # compose network — `S3_ENDPOINT` is used as the host for signed URLs.
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: pfadimh-files
      S3_REGION: auto
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      pfadimh-mongo:
        condition: service_healthy
      auth:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS http://localhost:3001/auth/signin > /dev/null || exit 1"
      interval: 5s
      timeout: 5s
      retries: 30

  site:
    build:
      context: .
      dockerfile: apps/site/Dockerfile
    environment:
      MONGODB_CONNECTION_STRING: mongodb://root:example@pfadimh-mongo:27017
      MONGODB_DB_NAME: pfadimh_e2e
    depends_on:
      pfadimh-mongo:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      # bash's /dev/tcp is a TCP probe that doesn't care about HTTP
      # status — site may legitimately 404 at `/` with a fresh Mongo.
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/3000"]
      interval: 5s
      timeout: 5s
      retries: 30

  e2e-runner:
    build:
      context: .
      dockerfile: infra/e2e-runner.Dockerfile
    environment:
      # Pass through from host env so playwright.config.ts's
      # `forbidOnly: !!process.env.CI` and `retries: CI ? 1 : 0` take
      # effect in GitHub Actions (no-op locally).
      - CI
    depends_on:
      admin:
        condition: service_healthy
      site:
        condition: service_healthy
      auth:
        condition: service_healthy
    # admin/site have real healthchecks, but mock-oidc is distroless
    # (no shell) so compose can't probe it. Wait for the OIDC discovery
    # endpoint before handing off to playwright — the image has curl.
    # Mount test-results so Playwright's traces (retain-on-failure) and
    # artifacts land on the host for inspection. The runner runs as
    # UID 1000 so the files are owned by the host user.
    volumes:
      - ./apps/e2e/test-results:/work/e2e/test-results
    # mock-oidc is distroless and has no healthcheck — wait for its
    # OIDC discovery endpoint before invoking playwright.
    command:
      - sh
      - -c
      - |
        until curl -fsS http://auth:3002/.well-known/openid-configuration > /dev/null 2>&1; do
          sleep 1
        done
        exec npx playwright test
