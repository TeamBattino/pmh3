services:
  pfadimh-mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - 27017:27017
    volumes:
      - ./data:/data/db

  mock-oidc:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    restart: unless-stopped
    ports:
      - 9000:9000
    environment:
      SERVER_PORT: "9000"
      JSON_CONFIG_PATH: /app/config/config.json
    volumes:
      - ./infra/mock-oidc:/app/config:ro
