name: Build and Start

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    # Admin env.ts enforces strict validation at module load. The build itself
    # never hits MongoDB or OIDC (lazy init + ISR), so these values are only
    # used to satisfy zod — they don't need to resolve to real services.
    env:
      AUTH_SECRET: ci-placeholder-secret
      MONGODB_CONNECTION_STRING: mongodb://placeholder.invalid:27017
      MONGODB_DB_NAME: placeholder
      AUTH_OIDC_ISSUER: http://placeholder.invalid/default
      AUTH_OIDC_CLIENT_ID: ci-placeholder
      AUTH_OIDC_CLIENT_SECRET: ci-placeholder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
