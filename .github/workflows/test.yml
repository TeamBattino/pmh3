name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "*"

jobs:
  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run test:unit

  integration:
    name: Integration
    runs-on: ubuntu-latest
    # Testcontainers uses the host's Docker daemon, which ubuntu-latest
    # runners always have available.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run test:integration

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    # `bun run test:e2e` fans out to the @pfadipuck/e2e package via
    # turbo, which runs `docker compose -f docker-compose.e2e.yml up
    # --build ... --exit-code-from e2e-runner`. The whole stack (mongo,
    # mock-oidc, admin, site, playwright runner) boots inside compose
    # and tears down after the runner exits. No host-side Playwright or
    # Chromium install is needed — everything runs inside containers.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run test:e2e

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/e2e/test-results/
          retention-days: 7

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs --no-color
