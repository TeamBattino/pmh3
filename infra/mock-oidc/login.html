<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mock MiData — Dev Login</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f7;
      }
      .card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        padding: 2.5rem;
        width: 100%;
        max-width: 26rem;
      }
      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.5rem;
      }
      p.subtitle {
        margin: 0 0 1.75rem;
        color: #666;
        font-size: 0.9rem;
      }
      .role {
        display: block;
        margin-bottom: 0.75rem;
      }
      .role:last-child {
        margin-bottom: 0;
      }
      .role button {
        width: 100%;
        padding: 1rem 1.25rem;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: white;
        cursor: pointer;
        text-align: left;
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.15s ease;
      }
      .role button:hover {
        border-color: #999;
        background: #fafafa;
        transform: translateY(-1px);
      }
      .role strong {
        display: block;
        font-size: 1rem;
        color: #111;
      }
      .role span {
        display: block;
        font-size: 0.8rem;
        color: #666;
        margin-top: 0.2rem;
      }
      .footer {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid #eee;
        font-size: 0.75rem;
        color: #999;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #18181b; }
        .card { background: #27272a; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
        h1 { color: #fafafa; }
        p.subtitle, .footer { color: #a1a1aa; }
        .role button { background: #3f3f46; border-color: #52525b; color: #fafafa; }
        .role button:hover { background: #52525b; border-color: #71717a; }
        .role strong { color: #fafafa; }
        .role span { color: #a1a1aa; }
        .footer { border-color: #3f3f46; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Mock MiData</h1>
      <p class="subtitle">Simulated MiData login — pick a test user</p>

      <!-- Admin: member of Abteilungsleitung group (1172) -->

        <input type="hidden" name="username" value="11001" />
        <input
          type="hidden"
          name="claims"
          value='{"id":11001,"first_name":"Dev","last_name":"Admin","nickname":"Akela","email":"admin@dev.local","company_name":null,"company":false,"address_care_of":null,"street":"Seestrasse 1","housenumber":"1","postbox":null,"zip_code":"8706","town":"Meilen","country":"CH","gender":"m","birthday":"1990-01-15","language":"de","primary_group_id":1172,"kantonalverband_id":2,"roles":[{"group_id":1172,"group_name":"Abteilung Meilen-Herrliberg","role":"Group::Abteilung::Abteilungsleitung","role_class":"Group::Abteilung::Abteilungsleitung","role_name":"Abteilungsleitung","permissions":["layer_and_below_full","layer_and_below_read"]},{"group_id":1645,"group_name":"Webteam","role":"Group::AbteilungsGremium::Leitung","role_class":"Group::AbteilungsGremium::Leitung","role_name":"Leitung","permissions":["group_full"]}]}'

      <form method="post" class="role">

          value='{"id":11004,"first_name":"Dev","last_name":"Member","nickname":"Shere Khan","email":"member@dev.local","company_name":null,"company":false,"address_care_of":null,"street":"Kirchgasse 3","housenumber":"3","postbox":null,"zip_code":"8706","town":"Meilen","country":"CH","gender":"w","birthday":"2005-11-25","language":"de","primary_group_id":7777,"kantonalverband_id":2,"roles":[{"group_id":7777,"group_name":"Biber","role":"Group::Biber::Biber","role_class":"Group::Biber::Biber","role_name":"Biber","permissions":[]}]}'

      <div class="footer">mock-oauth2-server simulating MiData · dev only</div>
    </div>
  </body>
</html>
